# Production edge nginx: SPA (web) + /api → FastAPI.
# Expect TLS termination on an outer reverse proxy / load balancer.
# Forwarded proto/host come from X-Forwarded-* headers.

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 8m;

    # Docker DNS — re-resolve after container recreate.
    resolver 127.0.0.11 valid=2s ipv6=off;

    # Real client IP when behind one hop of reverse proxy on docker/host network.
    # Adjust if your proxy sits elsewhere.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        # Safe when TLS is terminated upstream; browsers ignore over plain HTTP.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/health {
            set $api_upstream api:8000;
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            access_log off;
        }

        location /api/ {
            set $api_upstream api:8000;
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 5s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            set $web_upstream web:80;
            proxy_pass http://$web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
        }
    }
}
