services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-postgres}\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5672"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped

  automigrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command: sh -c "pip install alembic && sleep 5 && sh /app/run_migrate.sh"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: api-test
    environment:
      ENVIRONMENT: test
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/abh_edu_test
      RATE_LIMIT_FAIL_CLOSED: "false"
    # timeout 900 = макс 15 мин на всё, затем контейнер завершится (exit 124), чтобы не висел
    command: sh -c "timeout 900 sh -c 'python scripts/ensure_test_db.py && alembic upgrade head && pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80'"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      NOTIFIER_QUEUE: ${NOTIFIER_QUEUE:-email_tasks}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-5/60}
      RATE_LIMIT_REGISTER: ${RATE_LIMIT_REGISTER:-3/60}
      RATE_LIMIT_FORGOT: ${RATE_LIMIT_FORGOT:-3/300}
      RATE_LIMIT_RESET: ${RATE_LIMIT_RESET:-5/60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: Dockerfile
      target: notifier
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL is required}
      NOTIFIER_QUEUE: ${NOTIFIER_QUEUE:-email_tasks}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import pika; exit(0)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  pg_data: {}
