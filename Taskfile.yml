version: "3"
dotenv: [".env"]
vars:
  # Dev: override + observability (Prometheus/Grafana) + ELK.
  COMPOSE_DEV: "-f docker-compose.yml -f docker-compose.override.yml --profile observability --profile elk"
  COMPOSE_PROD: "-f docker-compose.yml -f docker-compose.prod.yml"

tasks:
  check:
    desc: Lint + production build фронта и lint бэка (как минимум frontend + backend jobs в CI)
    cmd: |
      npm run lint
      npm run build
      cd backend && poetry run flake8 app tests && poetry run bandit -r app

  test-frontend:
    desc: Frontend tests с coverage (как job frontend-tests в CI)
    cmd: npm run test:coverage

  migrate:
    desc: Run Alembic migrations via Docker (starts postgres if needed, then runs automigrate)
    cmd: docker compose up -d postgres && docker compose run --rm automigrate

  test:
    desc: Запуск API-тестов в Docker (postgres → тестовая БД → миграции → pytest + coverage)
    cmd: |
      docker compose --profile test build test
      docker compose up -d postgres
      until docker compose exec -T postgres pg_isready -U "{{.POSTGRES_USER}}" 2>/dev/null; do sleep 2; done
      docker compose run --rm test

  up:
    desc: Start core services (без observability/ELK)
    cmd: docker compose up -d

  up-prod:
    desc: Production deploy via scripts/deploy.sh (check-env + migrate + health)
    cmd: ./scripts/deploy.sh

  deploy:
    desc: Alias for up-prod
    cmds:
      - task: up-prod

  status:
    desc: Production compose status + health probes
    cmd: ./scripts/status.sh

  backup:
    desc: Dump PostgreSQL + media into ./backups/
    cmd: ./scripts/backup.sh

  create-admin:
    desc: Create/promote admin from ADMIN_* in .env (bcrypt via API container)
    cmd: ./scripts/create-admin.sh

  tunnel:
    desc: Start public HTTPS tunnel to local :80 (localtunnel)
    cmd: ./scripts/tunnel.sh start

  tunnel-stop:
    desc: Stop public tunnel
    cmd: ./scripts/tunnel.sh stop

  tunnel-status:
    desc: Show public tunnel status / URL
    cmd: ./scripts/tunnel.sh status

  down:
    desc: Stop all services
    cmd: docker compose down -v

  down-prod:
    desc: Stop production stack (keeps volumes)
    cmd: docker compose {{.COMPOSE_PROD}} down

  build:
    desc: Build all services
    cmd: docker compose build

  dev:
    desc: Полный сброс и подъём в dev — clear, down -v, build, up (observability + ELK), healthchecks, деструктивный seed, migrate
    cmd: |
      clear || true
      docker compose {{.COMPOSE_DEV}} down -v
      docker compose {{.COMPOSE_DEV}} build
      # Важно: не стартуем `automigrate` автоматически, иначе оно выполнит backfill до seed.
      # --wait: дождаться healthy (api, ES, Logstash, …); первый старт ELK может занять несколько минут.
      docker compose {{.COMPOSE_DEV}} up -d --wait --wait-timeout 600 postgres redis rabbitmq api web nginx notifier frontend-watch prometheus grafana elasticsearch logstash kibana vector-logs
      # Seed наполняет legacy-таблицы. Backfill (008) читает их, поэтому сначала докатываемся только до 007.
      docker compose {{.COMPOSE_DEV}} run --rm automigrate sh -c "alembic upgrade 007"
      docker compose {{.COMPOSE_DEV}} exec -T postgres psql -U "{{.POSTGRES_USER}}" -d "{{.POSTGRES_DB}}" < backend/scripts/seed_dev.sql
      # После seed докатываемся до head: выполняется 008 backfill и 010 integrity hardening.
      docker compose {{.COMPOSE_DEV}} run --rm automigrate

  dbdown:
    desc: Remove all data from database using truncate
    cmd: psql "postgresql://{{.POSTGRES_USER}}:{{.POSTGRES_PASSWORD}}@localhost:5432/{{.POSTGRES_DB}}" -c "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = current_schema()) LOOP EXECUTE 'TRUNCATE TABLE ' || quote_ident(r.tablename) || ' RESTART IDENTITY CASCADE;'; END LOOP; END \$\$;"
