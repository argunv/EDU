# Единственная точка входа браузера к стеку: nginx на :80 (см. NGINX_HOST_PORT).
# location /api/ → upstream api:8000; URI не режется (на бэкенд уходит тот же путь /api/...).
# location / → upstream web:80 (SPA). Документация FastAPI /docs и /openapi.json на этом порту не проксируются — только прямой доступ к сервису api (например :8000 с override).

events {
    worker_connections 1024;
}

http {
    # Скрыть версию nginx в заголовках (безопасность)
    server_tokens off;

    # Docker DNS: периодическое разрешение имён контейнеров (иначе после recreate api/web — старый IP и connection refused).
    resolver 127.0.0.11 valid=2s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Общие заголовки безопасности
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # Передаём полный URI в api (без среза /api), чтобы путь не терялся.
        # set + proxy_pass — рескейвинг DNS через resolver (см. выше).
        location /api/ {
            set $api_upstream api:8000;
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
            # Короткие обрывы (uvicorn --reload): повтор при ошибке соединения (для POST тело уже прочитано — повтор может не сработать).
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 5s;
            proxy_connect_timeout 15s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            set $web_upstream web:80;
            proxy_pass http://$web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
