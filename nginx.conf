# Единственная точка входа: весь трафик идёт через nginx.
# API не открыт наружу — только через /api/; статика — через /.

events {
    worker_connections 1024;
}

http {
    # Скрыть версию nginx в заголовках (безопасность)
    server_tokens off;

    # Статичные upstream: имена резолвятся при старте nginx. После деплоя deploy.sh перезапускает nginx — тогда IP актуальны.
    upstream api {
        server api:8000;
    }
    upstream web {
        server web:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Общие заголовки безопасности
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Передаём полный URI в api (без среза /api), чтобы путь не терялся.
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
