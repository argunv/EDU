name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint/Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run frontend tests with coverage
        run: npm run test -- --run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage
          if-no-files-found: warn

  backend:
    name: Backend Lint/Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Postgres только на время job; пароль не хранится в репозитории.
    # Настройка: Settings → Secrets and variables → Actions → repository secret
    #   CI_POSTGRES_PASSWORD — любой надёжный пароль (не от prod).
    # pull_request из fork не получает secrets — job упадёт на проверке; это ожидаемо.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: abh_edu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abh_edu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      RATE_LIMIT_FAIL_CLOSED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Require CI postgres secret
        env:
          CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        run: |
          if [ -z "${CI_POSTGRES_PASSWORD:-}" ]; then
            echo "::error::Задайте secret CI_POSTGRES_PASSWORD (пароль ephemeral Postgres в CI, не из production)."
            exit 1
          fi
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend deps
        run: poetry install --with dev
      - name: Lint
        run: poetry run flake8 app && poetry run bandit -r app
      - name: Configure DATABASE_URL
        env:
          CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        run: |
          ENC=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['CI_POSTGRES_PASSWORD'], safe=''))")
          echo "DATABASE_URL=postgresql+psycopg2://postgres:${ENC}@127.0.0.1:5432/abh_edu_test" >> "$GITHUB_ENV"
      - name: Apply DB migrations
        run: poetry run alembic upgrade head
      - name: Test
        run: poetry run pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80
