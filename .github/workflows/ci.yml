name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Lint/Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage
          if-no-files-found: warn

  backend:
    name: Backend Lint/Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abh_edu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abh_edu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/abh_edu_test
      RATE_LIMIT_FAIL_CLOSED: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Set ephemeral CI secrets
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend deps
        run: poetry install --with dev
      - name: Lint
        run: poetry run flake8 app tests && poetry run bandit -r app
      - name: Apply DB migrations
        run: poetry run alembic upgrade head
      - name: Test
        run: poetry run pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80

  production-artifacts:
    name: Production Docker/Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate deployment configuration
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.override.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          bash -n scripts/*.sh backend/run_migrate.sh
      - name: Build production images
        run: |
          docker build --target api -t abh-edu-api:ci .
          docker build --target web -t abh-edu-web:ci .
          docker build --target notifier -t abh-edu-notifier:ci .
      - name: Verify runtime image contents
        run: |
          docker run --rm abh-edu-api:ci sh -c 'test ! -d /app/tests && ! command -v poetry'
          docker run --rm abh-edu-web:ci nginx -t
