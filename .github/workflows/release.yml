name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Lint/Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  backend:
    name: Backend Lint/Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abh_edu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abh_edu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/abh_edu_test
      RATE_LIMIT_FAIL_CLOSED: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Set ephemeral CI secrets
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install poetry
      - run: poetry install --with dev
      - run: poetry run flake8 app tests && poetry run bandit -r app
      - run: poetry run alembic upgrade head
      - run: poetry run pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80

  release:
    name: Create GitHub Release
    needs: [frontend, frontend-tests, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate changelog
        run: |
          echo "## Changes" > RELEASE_NOTES.md
          git log --pretty=format:"- %s (%h)" "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"..HEAD >> RELEASE_NOTES.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
